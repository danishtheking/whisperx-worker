name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create HF token secret file
        run: echo "${{ secrets.HF_TOKEN }}" > /tmp/hf_token

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            danishworkai/whisperx-worker:latest
            danishworkai/whisperx-worker:${{ github.sha }}
          secret-files: |
            hf_token=/tmp/hf_token
          cache-from: type=gha
          cache-to: type=gha,mode=max
